<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Product list with cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <section class="products-section">
      <h1>Desserts</h1>
      <div class="products-grid" id="products-grid"></div>
    </section>

    <aside class="cart-section" id="cart-section">
      <h2>Your Cart (<span id="cart-count">0</span>)</h2>
      <div class="cart-empty" id="cart-empty">
        <img src="./assets/images/illustration-empty-cart.svg" alt="Empty cart illustration">
        <p>Your added items will appear here</p>
      </div>
      <div class="cart-items" id="cart-items"></div>
      <div class="cart-footer" id="cart-footer" style="display:none;">
        <div class="order-total">
          <span>Order Total</span>
          <span class="total-price" id="total-price">$0.00</span>
        </div>
        <div class="carbon-neutral">
          <img src="./assets/images/icon-carbon-neutral.svg" alt="carbon neutral">
          <p>This is a <strong>carbon-neutral</strong> delivery</p>
        </div>
        <button class="confirm-btn" id="confirm-btn">Confirm Order</button>
      </div>
    </aside>
  </main>

  <!-- Order Confirmation Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <img src="./assets/images/icon-order-confirmed.svg" alt="Order confirmed">
      <h2>Order Confirmed</h2>
      <p>We hope you enjoy your food!</p>
      <div class="modal-items" id="modal-items"></div>
      <div class="modal-total">
        <span>Order Total</span>
        <span class="total-price" id="modal-total-price">$0.00</span>
      </div>
      <button class="new-order-btn" id="new-order-btn">Start New Order</button>
    </div>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">CI-12 Grp-A</a>.
  </footer>

  <script src="app.js"></script>
</body>
  </html>
